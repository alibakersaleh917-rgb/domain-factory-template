name: Content Maintenance

on:
  schedule:
    - cron: '30 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: python scripts/check_generation_env.py --required "GROQ_API_KEY"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Update old articles
        run: python scripts/update_old_articles.py
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@noreply.com"
          git add content/posts/ logs/ || true
          if git diff --cached --quiet; then
            echo "No maintenance changes to commit."
            exit 0
          fi
          git commit -m "auto: maintenance $(date +%Y-%m-%d)"
          git push

name: Auto Publish Article

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 3'
  workflow_dispatch:
    inputs:
      domain_config_path:
        description: "Path to domain config file (YAML/JSON)"
        required: false
        default: "data/domain.yaml"
      keyword:
        description: "Optional explicit keyword override"
        required: false
        default: ""

permissions:
  contents: write

env:
  DOMAIN_CONFIG_PATH: ${{ github.event.inputs.domain_config_path || 'data/domain.yaml' }}

jobs:
  publish-single:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Python (with pip cache)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'requirements.txt'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate required secrets
        run: python scripts/check_generation_env.py --required "OPENROUTER_API_KEY,GROQ_API_KEY"
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Validate domain/theme config
        run: python scripts/validate_config.py

      - name: Generate single article (fast path)
        run: |
          if [ -n "${{ github.event.inputs.keyword }}" ]; then
            python scripts/generate_article.py --count 1 --keyword "${{ github.event.inputs.keyword }}"
          else
            python scripts/generate_article.py --count 1
          fi
        env:
          DOMAIN_CONFIG_PATH: ${{ env.DOMAIN_CONFIG_PATH }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@noreply.com"
          git add content/posts/ logs/ keywords/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "auto: article $(date +%Y-%m-%d)"
          git push

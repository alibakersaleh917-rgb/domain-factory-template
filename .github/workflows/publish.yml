name: Auto Publish Article

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate article
        run: python scripts/generate_article.py
        env:
          OPENROUTER_KEY: ${{ secrets.OPENROUTER_KEY }}
          UNSPLASH_KEY: ${{ secrets.UNSPLASH_KEY }}

      - name: Commit and push
        run: |
          git config user.name "AutoBot"
          git config user.email "bot@noreply.com"
          git add content/ static/ || true
          git diff --cached --quiet || git commit -m "auto: article $(date +%Y-%m-%d)"
          git push
